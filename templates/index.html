<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Voice AI Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .chat {
            width: 420px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #333; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 12px;
            cursor: pointer;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            transition: 0.2s;
        }

        .btn-send { background: #4CAF50; color: white; }
        .btn-mic { background: #008CBA; color: white; width: 100%; margin-top: 10px; font-weight: bold; font-size: 16px; }
        .btn-mic.listening { background: #ff4d4d; animation: pulse 1.5s infinite; }

        .ai-box {
            margin-top: 15px;
            padding: 15px;
            background: #eef1ff;
            border-radius: 8px;
            min-height: 80px;
            font-size: 15px;
            line-height: 1.5;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="chat">
    <h2>🎙️ Voice AI Chat</h2>

    <div class="controls">
        <input id="userInput" placeholder="Yozing yoki mikrofonni bosing..." />
        <button class="btn-send" onclick="sendMessage()">📨</button>
    </div>

    <button id="micBtn" class="btn-mic" onclick="startListening()">🎤 Gapirish</button>

    <div class="ai-box">
        <b>AI:</b> <span id="aiText">Zavqli suhbatga tayyorman...</span>
    </div>

    <button style="width: 100%; margin-top: 10px; background: #ddd;" onclick="stopSpeech()">🔇 Ovozni to'xtatish</button>
</div>

<script>
let utterance = null;
const aiTextSpan = document.getElementById("aiText");
const micBtn = document.getElementById("micBtn");
const userInput = document.getElementById("userInput");

// 1. XABAR YUBORISH VA AVTOMATIK GAPIRTIRISH
async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = "";
    aiTextSpan.innerText = "O'ylamoqda...";
    stopSpeech(); // Oldingi ovozni to'xtatamiz

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        const responseText = data.response;
        aiTextSpan.innerText = responseText;

        // Javob kelgan zahoti AI o'zi gapirishni boshlaydi
        speak(responseText);

    } catch (error) {
        aiTextSpan.innerText = "Xatolik yuz berdi.";
    }
}

// 2. ISTALGAN TILDA GAPIRISH (TTS)
function speak(text) {
    stopSpeech();
    utterance = new SpeechSynthesisUtterance(text);

    // Qat'iy ingliz tilini olib tashladik. Endi brauzer matnga qarab tilni o'zi moslaydi.
    utterance.rate = 1.0;
    utterance.pitch = 1.2; // Ozgina nozikroq ovoz

    window.speechSynthesis.speak(utterance);
}

function stopSpeech() {
    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
        window.speechSynthesis.cancel();
    }
}

// 3. OVOZNI ESHITISH VA MATNGA AYLANTIRISH (STT)
function startListening() {
    // Brauzer mikrofonni qo'llab-quvvatlashini tekshiramiz (Chrome, Edge'da ishlaydi)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Kechirasiz, brauzeringiz ovozli yozishni qo'llab-quvvatlamaydi. Iltimos, Google Chrome ishlating.");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "uz-UZ"; // Eshitish tili (Ruscha uchun: 'ru-RU', Inglizcha: 'en-US')
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = function() {
        micBtn.classList.add("listening");
        micBtn.innerText = "🔴 Eshitilmoqda (gapiring)...";
        stopSpeech();
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        userInput.value = transcript;
        micBtn.classList.remove("listening");
        micBtn.innerText = "🎤 Gapirish";

        // Gapirib bo'lingach, avtomat backendga jo'natadi!
        sendMessage();
    };

    recognition.onerror = function(event) {
        micBtn.classList.remove("listening");
        micBtn.innerText = "🎤 Gapirish";
        console.error("Mikrofon xatosi: ", event.error);
    };

    recognition.onend = function() {
        micBtn.classList.remove("listening");
        micBtn.innerText = "🎤 Gapirish";
    };

    recognition.start();
}
</script>

</body>
</html>
