<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>AI Voice Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    /* Umumiy o'zgarishlar */
    :root {
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --user-msg: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        --ai-msg: rgba(31, 41, 55, 0.8);
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-gradient);
        display: flex;
        flex-direction: column;
        height: 100vh;
        color: white;
    }

    header {
        background: rgba(17, 24, 39, 0.8);
        backdrop-filter: blur(10px);
        color: #38bdf8;
        padding: 18px;
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 1px;
        border-bottom: 1px solid var(--glass-border);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        scroll-behavior: smooth;
    }

    /* Scrollbarni chiroyli qilish */
    #chat-box::-webkit-scrollbar {
        width: 6px;
    }
    #chat-box::-webkit-scrollbar-thumb {
        background: var(--glass-border);
        border-radius: 10px;
    }

    .message {
        max-width: 80%;
        padding: 12px 18px;
        border-radius: 20px;
        font-size: 15px;
        line-height: 1.5;
        position: relative;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .user {
        align-self: flex-end;
        background: var(--user-msg);
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .ai {
        align-self: flex-start;
        background: var(--ai-msg);
        color: #e5e7eb;
        border-bottom-left-radius: 4px;
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(5px);
    }

    #input-area {
        display: flex;
        align-items: center;
        padding: 15px 20px;
        background: rgba(15, 23, 42, 0.9);
        border-top: 1px solid var(--glass-border);
        gap: 10px;
    }

    #user-input {
        flex: 1;
        padding: 12px 16px;
        border-radius: 25px;
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        outline: none;
        font-size: 15px;
        transition: all 0.3s ease;
    }

    #user-input:focus {
        border-color: #2563eb;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 10px rgba(37, 99, 235, 0.2);
    }

    button {
        padding: 12px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        width: 45px;
        height: 45px;
    }

    #mic-btn {
        background: #ef4444;
        color: white;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    #mic-btn:hover {
        transform: scale(1.1);
        background: #f87171;
    }

    #mic-btn:active {
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    #send-btn {
        background: #22c55e;
        color: white;
        border-radius: 12px;
        width: auto;
        padding: 0 20px;
        border-radius: 25px;
        box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }

    #send-btn:hover {
        background: #16a34a;
        transform: translateY(-2px);
    }

    #send-btn:active {
        transform: translateY(0);
    }
</style>
</head>
<body>

<header>✨ AI Voice Chat</header>

<div id="chat-box"></div>

<div id="input-area">
    <button id="mic-btn" title="Ovozli yozish">🎤</button>
    <input type="text" id="user-input" placeholder="Xabar yozing..." autocomplete="off">
    <button id="send-btn">Yuborish</button>
</div>

<script>
// Sizning JS kodingiz o'zgarishsiz qoldi
const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const micBtn = document.getElementById("mic-btn");

function addMessage(text, className) {
    const div = document.createElement("div");
    div.classList.add("message", className);
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    addMessage(message, "user");
    userInput.value = "";

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        });

        const data = await response.json();

        if (data.response) {
            addMessage(data.response, "ai");
        } else {
            addMessage("Server xatolik berdi", "ai");
        }

    } catch (error) {
        addMessage("Server bilan aloqa yo‘q", "ai");
    }
}

sendBtn.onclick = sendMessage;

userInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

if ("webkitSpeechRecognition" in window) {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "uz-UZ";

    micBtn.onclick = () => {
        recognition.start();
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        userInput.value = transcript;
        sendMessage();
    };
} else {
    micBtn.style.display = "none";
}
</script>

</body>
</html>
